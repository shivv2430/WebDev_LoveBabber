<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Pass | Premium Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="toast-container" id="toast-container"></div>

    <div class="container">
        <h1>Secure <span>Generator</span></h1>
        
        <div class="display"> 
            <input type="text" id="password" readonly placeholder="P@ssw0rd123">
            <img src="image/copy.png" id="copyPassword" title="Copy to clipboard">
        </div>

        <div class="strength-meter">
            <div class="strength-bar" id="strength-bar"></div>
        </div>

        <div class="options-wrap">
            <div class="length-slider">
                <div class="length-label-wrap">
                    <span>Password Length</span>
                    <span id="length-val">12</span>
                </div>
                <input type="range" id="length-slider" min="8" max="32" value="12">
            </div>

            <div class="checkbox-wrap">
                <label class="option">
                    <input type="checkbox" id="uppercase" checked> Uppercase
                </label>
                <label class="option">
                    <input type="checkbox" id="lowercase" checked> Lowercase
                </label>
                <label class="option">
                    <input type="checkbox" id="numbers" checked > Numbers
                </label>
                <label class="option">
                    <input type="checkbox" id="symbols" checked> Symbols
                </label>
            </div>
        </div>
        
        <button id="generate_password"> 
            <img src="image/key.png" alt="">
            Generate Password
        </button>
    </div>

    <footer>Modern Security by Shivani</footer>

    <script src="script.js"></script>
</body>
</html>
