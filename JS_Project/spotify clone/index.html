<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <p class="tag">Music for every mood</p>
      <h1>Spotify Clone</h1>
      <p class="subtitle">A starter layout for your music player project.</p>
      <button class="play-btn" type="button">Play Demo</button>
    </header>

    <section class="playlist">
      <h2>Trending Tracks</h2>
      <div class="track-list">
        <article class="track-card">
          <div class="cover"></div>
          <h3>Midnight Echo</h3>
          <p>Nova Beats</p>
        </article>
        <article class="track-card">
          <div class="cover"></div>
          <h3>City Lights</h3>
          <p>Skyline Sound</p>
        </article>
        <article class="track-card">
          <div class="cover"></div>
          <h3>Waves</h3>
          <p>Ocean Avenue</p>
        </article>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
