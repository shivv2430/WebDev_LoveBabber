<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zomato Clone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://kit.fontawesome.com/8674758a92.js" crossorigin="anonymous"></script>
</head>
<body>

<header class="hero">
    <nav class="navbar">
        <div class="logo-text">zomato</div>
        <ul class="nav-links">
            <li><a href="#">Add restaurant</a></li>
            <li><a href="#">Log in</a></li>
            <li><a href="#">Sign up</a></li>
        </ul>
    </nav>
    <div class="hero-content">
        <h1>zomato</h1>
        <p>Discover the best food & drinks in your city</p>
        <div class="search-bar">
            <i class="fa-solid fa-location-dot location-icon"></i>
            <div class="divider"></div>
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="search" placeholder="Search for restaurant, cuisine or a dish">
        </div>
    </div>
</header>

<section class="main-section">
    <h2>Best Food in City</h2>
    <div class="container" id="restaurantList">
    </div>
</section>

<footer>
    <div class="footer-content">
        <div class="footer-logo">zomato</div>
        <p>© 2026 Zomato Clone | Made by Shivani Pal</p>
    </div>
</footer>

<script src="script.js"></script>

</body>
</html>
