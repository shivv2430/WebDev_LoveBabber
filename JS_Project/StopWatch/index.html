<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch Pro | Modern UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="stopwatch">
            <div class="header">
                <h2>Stopwatch</h2>
            </div>
            
            <h1 id="displayTime">00:00:00<span style="font-size: 2.5rem; opacity: 0.5">.00</span></h1>
            
            <div class="buttons">        
                <!-- Start Button -->
                <button class="btn btn-start" id="startBtn" onclick="watchStart()" title="Start">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                
                <!-- Stop Button -->
                <button class="btn btn-stop" onclick="watchStop()" title="Stop">
                    <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                </button>
                
                <!-- Reset Button -->
                <button class="btn btn-reset" onclick="watchReset()" title="Reset">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
            </div>

            <div class="laps-container" id="lapsList">
                <!-- Laps will be injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
