<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music_Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/8674758a92.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="music_player">
        <nav>
            <div class="circle">
                <i class="fa-solid fa-angle-left"></i>
            </div>
            <div class="circle">
                <i class="fa-solid fa-bars"></i>
            </div>
        </nav>
        <img src="media/468-thumbnail.png" class="song-img">
        <h1>Despacito</h1>
        <p>Luis Fonsi Ft. Puerto Ricon</p>

        <audio  id="song">
            <source src="media/audio.mp3" type="audio/mp3">
        </audio>
        <input type="range" value="0" id="progress">
         
        <div class="controls">
            <div><i class="fa-solid fa-backward"></i></div>
            <div onclick="playPause()"><i class="fa-solid fa-play" id="ctrlIcon"></i></div>
            <div><div><i class="fa-solid fa-forward"></i></div></div>
        </div>


    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
