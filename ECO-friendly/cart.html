<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shopping Cart | Waste2Wealth</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        .cart-container {
            padding: 50px 8%;
            min-height: 100vh;
        }

        .cart-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .cart-title h1 {
            font-size: 3rem;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .cart-items {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
        }

        .cart-item {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .cart-item img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 15px;
        }

        .item-info {
            flex: 1;
        }

        .item-info h3 {
            margin-bottom: 10px;
        }

        .item-price {
            color: #10b981;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .quantity-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .qty-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: #10b981;
            color: white;
            font-weight: bold;
        }

        .remove-btn {
            border: none;
            padding: 10px 15px;
            background: #ef4444;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        .summary {
            background: white;
            border-radius: 25px;
            padding: 25px;
            height: fit-content;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
        }

        .summary h2 {
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
        }

        .total {
            font-size: 1.5rem;
            font-weight: 700;
            color: #10b981;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 20px;
            border: none;
            padding: 15px;

            color: white;
            cursor: pointer;

            border-radius: 15px;

            font-size: 16px;
            font-weight: 600;

            background:
                linear-gradient(135deg,
                    #10b981,
                    #06b6d4);
        }

        .empty-cart {
            text-align: center;
            padding: 50px;
        }

        .dark .cart-items,
        .dark .summary {
            background: #1e293b;
        }

        @media(max-width:900px) {

            .cart-layout {
                grid-template-columns: 1fr;
            }

            .cart-item {
                flex-direction: column;
                text-align: center;
            }

            .cart-title h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            ♻ Waste2Wealth
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="seller.html">Sell</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>

        <button id="themeBtn">
            🌙
        </button>

    </nav>

    <section class="cart-container">

        <div class="cart-title">

            <h1>Your Cart 🛒</h1>

            <p>
                Review your eco-friendly purchases.
            </p>

        </div>

        <div class="cart-layout">

            <div class="cart-items" id="cartItems">

            </div>

            <div class="summary">

                <h2>Order Summary</h2>

                <div class="summary-row">
                    <span>Items</span>
                    <span id="itemCount">0</span>
                </div>

                <div class="summary-row">
                    <span>Shipping</span>
                    <span>₹50</span>
                </div>

                <hr>

                <div class="summary-row total">
                    <span>Total</span>
                    <span id="totalPrice">₹0</span>
                </div>

                <button class="checkout-btn" onclick="checkout()">

                    Proceed To Checkout

                </button>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

    <script>

        let cart =
            JSON.parse(
                localStorage.getItem("cart")
            ) || [];

        function renderCart() {

            const cartItems =
                document.getElementById(
                    "cartItems"
                );

            cartItems.innerHTML = "";

            if (cart.length === 0) {

                cartItems.innerHTML = `

<div class="empty-cart">

<h2>🛒 Cart is Empty</h2>

<br>

<a
href="products.html"
class="btn-primary">

Shop Now

</a>

</div>

`;

                document.getElementById(
                    "itemCount"
                ).innerText = 0;

                document.getElementById(
                    "totalPrice"
                ).innerText = "₹0";

                return;

            }

            let total = 0;

            cart.forEach((item, index) => {

                total += item.price;

                cartItems.innerHTML += `

<div class="cart-item">

<img src="${item.image}">

<div class="item-info">

<h3>${item.name}</h3>

<p>
Made from:
${item.material}
</p>

<div class="item-price">
₹${item.price}
</div>

</div>

<button
class="remove-btn"
onclick="removeItem(${index})">

Remove

</button>

</div>

`;

            });

            document.getElementById(
                "itemCount"
            ).innerText =
                cart.length;

            document.getElementById(
                "totalPrice"
            ).innerText =
                "₹" + (total + 50);

        }

        function removeItem(index) {

            cart.splice(index, 1);

            localStorage.setItem(
                "cart",
                JSON.stringify(cart)
            );

            renderCart();

        }

        function checkout() {

            if (cart.length === 0) {

                alert(
                    "Your cart is empty!"
                );

                return;
            }

            alert(
                "🎉 Order Placed Successfully!\n\nThank you for supporting sustainable products."
            );

            localStorage.setItem(
                "cart",
                JSON.stringify([])
            );

            renderCart();

        }

        renderCart();

    </script>

</body>

</html>
