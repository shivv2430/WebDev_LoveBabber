<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
    <nav>
        <h2 class="logo">MyPortfolio</h2>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- Hero Section -->
<section id="home" class="hero">
    <h1>Hello, I'm <span>Shivani</span></h1>
    <p>A Web Developer</p>
    <button onclick="scrollToSection('contact')">Hire Me</button>
</section>

<!-- About -->
<section id="about">
    <h2>About Me</h2>
    <p>I am a passionate developer learning HTML, CSS, JavaScript and C++.</p>
</section>

<!-- Projects -->
<section id="projects">
    <h2>My Projects</h2>
    <div class="project-container">
        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
    </div>
</section>

<!-- Contact -->
<section id="contact">
    <h2>Contact Me</h2>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Your Message"></textarea>
    <button onclick="showAlert()">Send</button>
</section>

<script src="script.js"></script>
</body>
</html>
