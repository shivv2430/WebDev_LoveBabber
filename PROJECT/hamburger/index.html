<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hamburger Sidebar Menu</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      overflow-x:hidden;
    }

    /* Navbar */
    .navbar{
      width:100%;
      height:70px;
      background:#111827;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 25px;
      color:white;
    }

    .logo{
      font-size:24px;
      font-weight:bold;
    }

    /* Hamburger */
    .hamburger{
      width:35px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .hamburger span{
      width:100%;
      height:4px;
      background:white;
      border-radius:5px;
      transition:0.3s;
    }

    /* Sidebar */
    .sidebar{
      position:fixed;
      top:0;
      right:-320px;
      width:300px;
      height:100vh;
      background:white;
      box-shadow:-5px 0 15px rgba(0,0,0,0.2);
      padding:25px;
      transition:0.4s ease;
      z-index:1000;
    }

    .sidebar.active{
      right:0;
    }

    .sidebar h2{
      margin-bottom:30px;
      color:#111827;
    }

    /* Menu Cards */
    .menu-card{
      background:#f3f4f6;
      padding:18px;
      margin-bottom:20px;
      border-radius:14px;
      display:flex;
      align-items:center;
      gap:15px;
      cursor:pointer;
      transition:0.3s;
    }

    .menu-card:hover{
      background:#e5e7eb;
      transform:translateX(-5px);
    }

    .icon{
      font-size:24px;
    }

    .menu-text{
      font-size:18px;
      font-weight:600;
      color:#111827;
    }

    /* Overlay */
    .overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100vh;
      background:rgba(0,0,0,0.4);
      opacity:0;
      pointer-events:none;
      transition:0.3s;
    }

    .overlay.active{
      opacity:1;
      pointer-events:all;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">My App</div>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h2>Menu</h2>

    <div class="menu-card">
      <div class="icon">⚙️</div>
      <div class="menu-text">Settings</div>
    </div>

    <div class="menu-card">
      <div class="icon">❤️</div>
      <div class="menu-text">Favorite Card</div>
    </div>

    <div class="menu-card">
      <div class="icon">🗑️</div>
      <div class="menu-text">Delete Card</div>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <script>
    const hamburger = document.getElementById("hamburger");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    hamburger.addEventListener("click", () => {
      sidebar.classList.toggle("active");
      overlay.classList.toggle("active");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    });
  </script>

</body>
</html>
