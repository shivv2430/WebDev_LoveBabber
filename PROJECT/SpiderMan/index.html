<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spider-Verse UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Progress Bar -->
<div id="progress-bar"></div>
<div class="spider-container">
  <img src="https://i.ibb.co/6bQYw6P/spider.png" alt="Spider" class="spider">
</div>

<header>
  <h1>🕸️ Spider-Verse Chronicles</h1>
</header>

<section class="content">
  <h2>Explore Spider-Man Eras</h2>

  <div class="accordion">

    <div class="accordion-item">
      <button class="accordion-header">🕸️ Tobey Maguire</button>
      <div class="accordion-content">
        <p>Classic emotional storytelling and iconic dialogue.</p>
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-header">⚡ Andrew Garfield</button>
      <div class="accordion-content">
        <p>Darker tone with strong emotional depth and romance.</p>
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-header">🧑‍🎓 Tom Holland</button>
      <div class="accordion-content">
        <p>Young Spider-Man in MCU balancing school and hero life.</p>
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-header">🎨 Miles Morales</button>
      <div class="accordion-content">
        <p>Multiverse animation masterpiece with unique visuals.</p>
      </div>
    </div>

  </div>
</section>

<footer>
  <p>Made for Practice 🚀</p>
</footer>

<script src="script.js"></script>
</body>
</html>
